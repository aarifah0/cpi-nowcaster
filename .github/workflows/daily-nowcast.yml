name: Daily CPI Nowcast

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows you to run it manually from GitHub

jobs:
  nowcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy fredapi xgboost scikit-learn
      
      - name: Run nowcast
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python src/nowcast.py
      
      - name: Commit and push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/nowcast.json
          git commit -m "Daily nowcast update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push